plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.baroudeurs.studio"
    compileSdkVersion flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.baroudeurs.studio"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            keyAlias System.getenv('KEY_ALIAS') ?: project.hasProperty('keyAlias') ? keyAlias : 'releasekey'
            keyPassword System.getenv('KEY_PASSWORD') ?: project.hasProperty('keyPassword') ? keyPassword : System.getenv('KEY_STORE_PASSWORD') ?: project.hasProperty('storePassword') ? storePassword : 'changeit'
            storeFile file(System.getenv('STORE_FILE') ?: project.hasProperty('storeFile') ? storeFile : '../app/releasekey.jks')
            storePassword System.getenv('STORE_PASSWORD') ?: project.hasProperty('storePassword') ? storePassword : 'changeit'
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }
}

flutter {
    source '../..'
}
