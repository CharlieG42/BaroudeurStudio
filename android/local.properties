# Chemin vers le SDK Flutter (à adapter selon ton installation)
# Exemple pour macOS/Linux: flutter.sdk=/opt/flutter
# Exemple pour Windows: flutter.sdk=C:\\chemin\\vers\\flutter
flutter.sdk=

# Chemin vers le SDK Android (à adapter selon ton installation)
# Exemple pour macOS: sdk.dir=/Users/<user>/Library/Android/sdk
# Exemple pour Linux: sdk.dir=/home/<user>/Android/Sdk
# Exemple pour Windows: sdk.dir=C:\\Users\\<user>\\AppData\\Local\\Android\\Sdk
sdk.dir=